openapi: "3.1.0"
jsonSchemaDialect: "https://spec.openapis.org/oas/3.1/dialect/base"
servers:
  - url: /ori-mock
    description: "Mock server voor ontwikkeling en testen"
info:
  title: "De ORI API voor Open Overheid (Feed Versie)"
  description: |
    Cursorbare feed voor het publiceren van Open Raads Informatie (ORI) wijzigingen.
    
    ## Federatieve publicatiefeed
    Bronhouders publiceren wijzigingen via `GET /feed`. Feed-items zijn dunne verwijzingen naar canonical ORI-resources. De resource achter `entityUrl` is leidend; de feed introduceert geen tweede datamodel.
    
    ## Synchronisatie
    Consumers synchroniseren door de feed bron-specifiek en oudste-eerst te lezen. Iedere response bevat een `nextCursor` waarmee de volgende batch kan worden opgehaald.
    
    ## Verwijderingen
    Verwijderingen worden expliciet gepubliceerd als `entity.delete`. Dit feed-item fungeert als tombstone; de bijbehorende `entityUrl` mag daarna `404` of `410` retourneren.
    
    ## Cursor verlopen
    Als een cursor niet meer beschikbaar is, retourneert de server `410 Gone`. De consumer moet dan opnieuw starten vanaf een volledige snapshot of export.
  version: "0.3.1-feed"
  x-imvertor-generator-version: "2.0.0"
  x-yamlCompiler-stylesheets-version: "20230315"
  contact:
    url: "https://gitlab.com/koop/woo/aanleveren-ori"
  license:
    name: "European Union Public License, version 1.2 (EUPL-1.2)"
    url: "https://eupl.eu/1.2/nl/"
security: []
paths:
  /feed:
    get:
      operationId: "getFeed"
      summary: "Wijzigingenfeed ophalen"
      description: |
        Vraag een oplopende, bron-specifieke feed van wijzigingen op.

        Feed-items bevatten geen volledige brondata. Een item meldt alleen dat een canonical resource is aangemaakt, gewijzigd of verwijderd.

        Bij `entity.upsert` moet `entityUrl` opvraagbaar zijn via de ORI resource endpoints.
        Bij `entity.delete` fungeert het feed-item als tombstone; `entityUrl` mag daarna `404` of `410` retourneren.
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: "Cursor uit een eerdere feed-response."
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          description: "Maximum aantal feed-items in de response."
      responses:
        200:
          description: "Feed batch"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
        400:
          description: "Ongeldige query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        401:
          description: "Je bent niet geautoriseerd voor deze aanvraag."
        410:
          description: "De opgegeven cursor is niet meer beschikbaar."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      tags:
        - "Feed"
  /agendapunten:
    get:
      operationId: "getagendapunten"
      summary: "Alle agendapunten opvragen."
      description: "Deze lijst kan in de toekomst gefilterd worden met behulp van query parameters."
      responses:
        200:
          description: "Zoekactie geslaagd"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAgendapuntList"
        401:
          description: "Je bent niet geautoriseerd voor deze aanvraag."
        404:
          description: "De gevraagde resource is niet gevonden."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      tags:
        - "Agendapunten"
  /agendapunten/{id}:
    get:
      operationId: "getagendapunt"
      summary: "Een specifiek agendapunt opvragen."
      description: "Een specifiek agendapunt opvragen op basis van een identifier."
      parameters:
        - in: path
          name: id
          schema:
            type: string
            description: "Unieke resource identifier."
          required: true
      responses:
        200:
          description: "Zoekactie geslaagd"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agendapunt"
        401:
          description: "Je bent niet geautoriseerd voor deze aanvraag."
        404:
          description: "De gevraagde resource is niet gevonden."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      tags:
        - "Agendapunten"
  /informatieobjecten:
    get:
      operationId: "getinformatieobjecten"
      summary: "Alle informatieobjecten opvragen."
      description: "Deze lijst kan in de toekomst gefilterd worden met behulp van query parameters."
      responses:
        200:
          description: "Zoekactie geslaagd"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedInformatieObjectList"
        401:
          description: "Je bent niet geautoriseerd voor deze aanvraag."
        404:
          description: "De gevraagde resource is niet gevonden."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      tags:
        - "Informatieobjecten"
  /informatieobjecten/{id}:
    get:
      operationId: "getinformatieobject"
      summary: "Een specifiek informatieobject opvragen."
      description: "Een specifiek informatieobject opvragen op basis van een identifier."
      parameters:
        - in: path
          name: id
          schema:
            type: string
            description: "Unieke resource identifier."
            title: ID
          required: true
      responses:
        200:
          description: "Zoekactie geslaagd"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InformatieObject"
        401:
          description: "Je bent niet geautoriseerd voor deze aanvraag."
        404:
          description: "De gevraagde resource is niet gevonden."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      tags:
        - "Informatieobjecten"
  /vergaderingen:
    get:
      operationId: "getvergaderingen"
      summary: "Alle vergaderingen opvragen."
      description: "Deze lijst kan in de toekomst gefilterd worden met behulp van query parameters."
